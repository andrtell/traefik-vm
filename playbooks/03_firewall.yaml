- name: Firewall

  hosts: all
  remote_user: agent
  become: true

  tasks:
    - name: Allow access to port SSH/22
      community.general.ufw:
        rule: allow 
        port: ssh
    
    - name: Allow access to port HTTP/80
      community.general.ufw: 
        rule: allow 
        port: http

    - name: Allow access to port HTTPS/443
      community.general.ufw:
        rule: allow
        port: https

    - name: Allow access to port HTTP/8000
      community.general.ufw: 
        rule: allow 
        port: 8000

    - name: Allow access to port HTTPS/4343
      community.general.ufw:
        rule: allow
        port: 4343

    - name: Allow access to port HTTP/8080
      community.general.ufw: 
        rule: allow 
        port: 8080

    - name: Enable port forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: true
    
    - name: Add port forwarding rules
      ansible.builtin.blockinfile:
        path: /etc/ufw/before.rules
        insertbefore: BOF
        block: |
          *nat
          :PREROUTING ACCEPT [0:0]
          -A PREROUTING -p tcp --dport 80  -j REDIRECT --to-port 8000
          -A PREROUTING -p tcp --dport 443 -j REDIRECT --to-port 4343
          COMMIT

    - name: Enable UFW
      community.general.ufw:
        default: deny
        state: enabled
